<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KOG — Beheer</title>
<meta name="robots" content="noindex, nofollow" />

<script src="../assets/vendor/tailwind-play.js"></script>
<style>
  @font-face { font-family:'Montserrat'; font-style:normal; font-weight:400; font-display:swap; src:url('../assets/fonts/montserrat-400.ttf') format('truetype'); }
  @font-face { font-family:'Montserrat'; font-style:normal; font-weight:600; font-display:swap; src:url('../assets/fonts/montserrat-600.ttf') format('truetype'); }
  @font-face { font-family:'Montserrat'; font-style:normal; font-weight:700; font-display:swap; src:url('../assets/fonts/montserrat-700.ttf') format('truetype'); }
</style>
<script>
  tailwind.config = {
    theme: { extend: { colors: {
      ink:'#1A1A1A', paper:'#FAFAF8', paper2:'#F1F0EA', rule:'#E5E2DA', mute:'#6B6862',
      sienna:'#CE1B24', sienna2:'#A3141B', leaf:'#5FA83C', leaf2:'#4C8B30',
    } } }
  }
</script>
<script src="../assets/vendor/supabase.min.js"></script>

<style>
  body { background:#FAFAF8; color:#1A1A1A; font-family:'Montserrat',ui-sans-serif,system-ui,sans-serif; }
  summary::-webkit-details-marker { display:none; }
  .app-shell { --sidebar-width: 15.5rem; }
  .app-shell[data-chromeless="true"] { --sidebar-width: 0rem; }
  .app-shell__overlay { opacity:0; pointer-events:none; transition: opacity .18s ease; }
  .app-shell[data-mobile-open="true"] .app-shell__overlay { opacity:1; pointer-events:auto; }
  .app-shell[data-mobile-open="true"] .app-shell__sidebar { transform: translateX(0); }
  .shell-nav-label, .shell-brand-copy, .shell-collapse-copy { transition: opacity .18s ease, transform .18s ease, max-width .18s ease; }
  /* Collapsed rail is desktop-only; on mobile the drawer always opens full-width. */
  @media (min-width: 1024px) {
    .app-shell[data-collapsed="true"] { --sidebar-width: 5.5rem; }
    .app-shell[data-collapsed="true"] .shell-nav-label,
    .app-shell[data-collapsed="true"] .shell-brand-copy,
    .app-shell[data-collapsed="true"] .shell-collapse-copy { opacity:0; max-width:0; transform: translateX(-4px); overflow:hidden; pointer-events:none; }
    .app-shell[data-collapsed="true"] .shell-nav-link { justify-content:center; gap:0; }
    .app-shell[data-collapsed="true"] .shell-nav-link .shell-nav-badge { display:none; }
    .app-shell[data-collapsed="true"] .shell-brand-stack { flex-direction:column; align-items:center; gap:.75rem; }
    /* Keep the collapsed header exactly as tall as the topbar so the border lines meet. */
    .app-shell[data-collapsed="true"] [data-shell-collapse] { display:none; }
    .app-shell[data-collapsed="true"] .shell-brand-meta { display:none; }
    .app-shell[data-collapsed="true"] .shell-sidebar-footer > div { justify-content:center; }
  }
  .fld { display:block; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#6B6862; margin-bottom:0; }
  .fld input, .fld select, .fld textarea {
    display:block; width:100%; margin-top:6px; padding:10px 12px; border:1px solid #E5E2DA; border-radius:4px;
    font-family:'Montserrat',sans-serif; font-size:14px; color:#1A1A1A; text-transform:none; letter-spacing:normal; background:#fff;
  }
  .fld input:focus, .fld select:focus, .fld textarea:focus { outline:none; border-color:#CE1B24; box-shadow:0 0 0 3px rgba(206,27,36,.18); }
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  @media (max-width:540px) { .form-grid { grid-template-columns:1fr; } }
  .fld + .fld, .form-grid + .fld { margin-top:14px; }
  .form-grid .fld { margin-top:0; }

  /* Language picker (same pattern as the public site) */
  .kog-lang { position: relative; }
  .kog-lang__trigger { display:inline-flex; align-items:center; gap:7px; padding:6px 4px; border:0; background:none; cursor:pointer; color:#1A1A1A; font:inherit; }
  .kog-flag { display:inline-flex; width:26px; height:19px; border:1px solid rgba(26,26,26,.12); overflow:hidden; flex:none; }
  .kog-flag svg { width:100%; height:100%; display:block; }
  .kog-lang__caret { width:9px; height:9px; opacity:.55; transition: transform .25s cubic-bezier(.2,.7,.2,1); }
  .kog-lang.open .kog-lang__caret { transform: rotate(180deg); }
  .kog-lang__menu {
    position:absolute; top:100%; right:0; margin-top:8px; min-width:150px;
    background:#FAFAF8; border:1px solid #E5E2DA; padding:6px; border-radius:6px;
    box-shadow:0 22px 54px -24px rgba(26,26,26,.32);
    opacity:0; visibility:hidden; transform: translateY(-4px);
    transition: opacity .2s, transform .2s, visibility .2s; z-index:70; list-style:none;
  }
  .kog-lang.open .kog-lang__menu { opacity:1; visibility:visible; transform: translateY(0); }
  .kog-lang__item { display:flex; align-items:center; gap:10px; width:100%; padding:8px 10px; background:none; border:0; cursor:pointer; font:inherit; font-size:13px; color:#1A1A1A; text-align:left; }
  .kog-lang__item:hover { background:#F1F0EA; color:#CE1B24; }
  .kog-lang__item[aria-selected="true"] { color:#CE1B24; font-weight:600; }
</style>
</head>
<body>

<!-- No login form here: all sign-ins go through ../mijn-pand/ (the single front door).
     The guard redirects anyone without a staff session there. -->
<div id="app-view" class="hidden min-h-screen"></div>

<script type="module">
  import { signOut, guard } from './js/auth.js';
  import { route, startRouter, refresh, navigate } from './js/router.js';
  import { mountAppShell } from './js/app-shell.js';
  import { applyStaticI18n, mountLangPicker, onLangChange } from './js/i18n.js';

  const routeChunks = new Map();
  function loadChunk(key) {
    if (!routeChunks.has(key)) {
      const loader = {
        quotes: () => import('./js/quotes.js'),
        properties: () => import('./js/properties.js'),
        entries: () => import('./js/entries.js'),
        agenda: () => import('./js/agenda.js'),
      }[key];
      routeChunks.set(key, loader());
    }
    return routeChunks.get(key);
  }

  function prefetchChunk(key) {
    void loadChunk(key);
  }

  applyStaticI18n();
  let shell = null;
  let root = null;

  route('/quotes', async () => {
    const { renderQuotesList } = await loadChunk('quotes');
    renderQuotesList(root);
  });
  route('/quotes/:id', async ({ id }) => {
    const { renderQuoteDetail } = await loadChunk('quotes');
    renderQuoteDetail(root, id);
  });
  route('/properties', async () => {
    const { renderPropertiesList } = await loadChunk('properties');
    renderPropertiesList(root);
  });
  route('/properties/:id', async ({ id }) => {
    const { renderPropertyDetail } = await loadChunk('properties');
    renderPropertyDetail(root, id);
  });
  route('/components/:id', async ({ id }) => {
    const { renderComponentDetail } = await loadChunk('entries');
    renderComponentDetail(root, id);
  });
  route('/agenda', async () => {
    const { renderAgenda } = await loadChunk('agenda');
    renderAgenda(root);
  });

  guard((session) => {
    if (shell) {
      shell.setSession(session);
      return;
    }
    shell = mountAppShell(document.getElementById('app-view'), {
      session,
      onLogout: () => signOut(),
      onPrefetchRoute: prefetchChunk,
    });
    root = shell.contentRoot;
    mountLangPicker(shell.langSlot);
    // The shell updates its own chrome on kog-langchange; here we only re-run
    // the static page bits and the active view.
    onLangChange(() => {
      applyStaticI18n();
      refresh();
    });
    if (!location.hash || location.hash === '#/') navigate('/quotes');
    startRouter();
    // Idle-prefetch the remaining route chunks so later navigation is instant.
    const prefetchAll = () => ['quotes', 'properties', 'entries', 'agenda'].forEach(prefetchChunk);
    if (window.requestIdleCallback) window.requestIdleCallback(prefetchAll);
    else setTimeout(prefetchAll, 0);
  });
</script>
</body>
</html>
